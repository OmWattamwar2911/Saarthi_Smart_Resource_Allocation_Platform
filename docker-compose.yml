version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: saarthi-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - saarthi-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saarthi-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/saarthi}
    ports:
      - "5000:5000"
    networks:
      - saarthi-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saarthi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "80:80"
    networks:
      - saarthi-net

volumes:
  mongo_data:

networks:
  saarthi-net:
    driver: bridge
