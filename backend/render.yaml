services:
  - type: web
    name: saarthi-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.com
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
